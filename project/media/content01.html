<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/page.css">
</head>
<body>
    <div class="wrap">
        <!-- header -->
        <header class="header02">
            <div class="inner">
                <h1 class="h_logo"><a href=""><img src="images/h_logo_txt.png" alt=""></a></h1>
                <ul class="h_btn_box">
                    <li class="item"><a href=""><img src="images/icon_search.svg" alt="검색하기" class="icon"></a></li>
                    <li class="item"><a href=""><img src="images/icon_gnb_my.svg" alt="마이페이지" class="icon"></a></li>
                </ul>
            </div>
        </header>
        <!-- 하단 nav -->
        <nav class="gnb_bottom">
            <div class="inner">
                <ul class="gnb_list">
                    <li class="item active">
                        <a href="">
                            <img src="images/icon_gnb_home.svg" alt="HOME icon" class="icon normal">
                            <img src="images/icon_gnb_home_active.svg" alt="HOME icon" class="icon active">
                            <strong>HOME</strong>
                        </a>
                    </li>
                    <li class="item">
                        <a href="">
                            <img src="images/icon_gnb_store.svg" alt="STORE icon" class="icon normal">
                            <img src="images/icon_gnb_store_active.svg" alt="STORE icon" class="icon active">
                            <strong>STORE</strong>
                        </a>
                    </li>
                    <li class="item">
                        <a href="">
                            <img src="images/icon_gnb_special.svg" alt="SPECIAL icon" class="icon normal">
                            <img src="images/icon_gnb_special_active.svg" alt="SPECIAL icon" class="icon active">
                            <strong>SPECIAL</strong>
                        </a>
                    </li>
                    <li class="item">
                        <a href="">
                            <img src="images/icon_gnb_my.svg" alt="MY icon" class="icon normal">
                            <img src="images/icon_gnb_my_active.svg" alt="MY icon" class="icon active">
                            <strong>MY</strong>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- 본문 -->
        <div class="main">
            <section class="post">
                <div class="inner">
                    <div class="post_heading_txt">
                        <h2 class="post_title">뷰티인싸's Pick! 야외활동에 필요한 뷰티제안서</h2>
                        <ul class="post_heading_info_box">
                            <li class="item">
                                <button class="info">
                                    <i class="fa fa-share-alt"></i>
                                    <span class="blind">공유하기</span>
                                </button>
                            </li>
                            <li class="item">
                                <div class="info">
                                    <i class="fa fa-heart-o"></i>
                                    <span class="blind">좋아요수</span>
                                    <span class="num">2K</span>
                                </div>
                            </li>
                            <li class="item">
                                <div class="info">
                                    <i class="fa fa-comment-o"></i>
                                    <span class="blind">댓글수</span>
                                    <span class="num">180</span>
                                </div>
                            </li>
                        </ul>
                    </div>
                    <div class="post_body">
                        
                    </div>
                </div>
            </section>
        </div>
    </div>


    <!-- script -->
    <script src="js/layout.js"></script>
</body>
</html>
